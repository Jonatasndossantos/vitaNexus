name: CI/CD VitaNexus Static

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup PHP & Node 🛠️
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install & Build 🔧
        run: |
          composer install --no-dev --prefer-dist
          cp .env.example .env
          php artisan key:generate
          npm install
          npm run build

      - name: Static Export (The Magic) ✨
        run: |
          mkdir -p out
          
          # 1. Gera o HTML puro
          php artisan tinker --execute='echo view("welcome")->render()' > out/index.html
          
          # 2. Copia as pastas EXATAMENTE como estão na sua public
          # Se suas imagens estão em public/assets/imagem, elas vão para out/assets/imagem
          cp -r public/build out/ 2>/dev/null || true
          cp -r public/assets out/ 2>/dev/null || true
          
          # 3. PADRONIZAÇÃO DE CAMINHOS (A "Marreta" Final)
          # Removemos http://localhost
          sed -i "s|http://localhost/||g" out/index.html
          sed -i "s|http://localhost||g" out/index.html
          
          # Transforma caminhos que começam com / em caminhos relativos (remove a primeira barra)
          # Ex: "/assets/..." vira "assets/..." | "/imagem/..." vira "imagem/..."
          sed -i 's|src="/|src="|g' out/index.html
          sed -i 's|href="/|href="|g' out/index.html
          
          # Corrige o erro do "../" - transforma "../../assets" ou "../assets" em "assets"
          sed -i 's|\.\./assets/|assets/|g' out/index.html
          
          # Garante que o CSS do Vite (build) seja achado
          # O Laravel costuma gerar /build/assets/... vamos garantir que vire build/assets/...
          sed -i 's|build/assets/|build/assets/|g' out/index.html

      - name: Deploy to GitHub Pages 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: out
          branch: gh-pages
