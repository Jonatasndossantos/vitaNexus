name: Deploy Blade Landing Page

on:
  push:
    branches: [ main ]

permissions:
  contents: write  # Permite que o bot crie a branch e faça push

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup PHP 🐘
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, dom, fileinfo

      - name: Install Composer Dependencies 📦
        run: composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      - name: Setup Node.js ⚙️
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Compile Assets (Tailwind/Vite) 🎨
        run: |
          npm install
          npm run build

      - name: Render Blade to HTML 📄
        run: |
          php -r '
            include "vendor/autoload.php";
            $app = require_once "bootstrap/app.php";
            $kernel = $app->make(Illuminate\Contracts\Console\Kernel::class);
            $kernel->bootstrap();

            $html = view("welcome")->render(); 
            
            // 1. Remove qualquer URL absoluta (localhost ou github.io/repo)
            // Isso transforma "https://.../build/assets/..." em "/build/assets/..."
            $html = preg_replace("/https?:\/\/[^\/]+\/[^\/]+\//", "/", $html);
            $html = str_replace("http://localhost/", "/", $html);

            // 2. Transforma caminhos absolutos em RELATIVOS (remove a barra inicial)
            // Isso transforma "/build/assets/..." em "build/assets/..."
            // E "/assets/imagem/..." em "assets/imagem/..."
            $html = str_replace("=\"/build/", "=\"build/", $html);
            $html = str_replace("=\"/assets/", "=\"assets/", $html);
            
            // 3. Caso o Vite use aspas simples no HTML:
            $html = str_replace("=\047/build/", "=\047build/", $html);
            $html = str_replace("=\047/assets/", "=\047assets/", $html);

            file_put_contents("public/index.html", $html);
          '

      - name: Deploy to GitHub Pages 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: public # O GitHub Pages vai servir o que estiver aqui
          branch: gh-pages
