name: Deploy Blade Landing Page

on:
  push:
    branches: [ main ]

permissions:
  contents: write  # Permite que o bot crie a branch e faça push

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup PHP 🐘
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, dom, fileinfo

      - name: Install Composer Dependencies 📦
        run: composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      - name: Setup Node.js ⚙️
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Compile Assets (Tailwind/Vite) 🎨
        run: |
          npm install
          npm run build

      - name: Render Blade to HTML 📄
        run: |
          # Configuramos a APP_URL dinamicamente para o GitHub Pages
          export APP_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"
          
          php -r '
            include "vendor/autoload.php";
            $app = require_once "bootstrap/app.php";
            $kernel = $app->make(Illuminate\Contracts\Console\Kernel::class);
            $kernel->bootstrap();

            // Forçamos a URL base para evitar o localhost nas imagens/assets
            url()->forceRootUrl(getenv("APP_URL"));

            $html = view("welcome")->render(); 
            
            // Se o seu projeto usa Vite, garantimos que o caminho do build seja relativo
            $html = str_replace("/build/", "build/", $html);
            // Se você usa assets manuais na pasta assets/dist:
            $html = str_replace("/assets/", "assets/", $html);

            file_put_contents("public/index.html", $html);
          '

      - name: Deploy to GitHub Pages 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: public # O GitHub Pages vai servir o que estiver aqui
          branch: gh-pages
