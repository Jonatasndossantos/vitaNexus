name: CI/CD VitaNexus Static

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup PHP & Node 🛠️
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install & Build 🔧
        run: |
          composer install --no-dev --prefer-dist
          cp .env.example .env
          php artisan key:generate
          npm install
          npm run build

      - name: Static Export (The Magic) ✨
        run: |
          # 1. Cria a pasta de saída
          mkdir -p out
          
          # 2. Renderiza o Blade para index.html usando o CLI do Laravel
          # Forçamos a URL para garantir que o helper asset() não use localhost
          php artisan tinker --execute='echo view("welcome")->render()' > out/index.html
          
          # 3. Copia os assets compilados (Vite) e os estáticos (Imagens)
          cp -r public/build out/
          cp -r public/assets out/ 2>/dev/null || true # Ignora se não houver a pasta assets
          
          # 4. CORREÇÃO DE CAMINHOS (O segredo do 404)
          # Removemos a barra inicial "/" de todos os links para torná-los relativos.
          # Isso faz "/build/..." virar "build/..." e funcionar em qualquer subdiretório.
          sed -i "s|=\"/build/|=\"build/|g" out/index.html
          sed -i "s|=\"/assets/|=\"assets/|g" out/index.html
          sed -i "s|=\"/|=\"|g" out/index.html # Remove barras de links root-relative

      - name: Deploy to GitHub Pages 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: out # Publica apenas a pasta que acabamos de montar
          branch: gh-pages
